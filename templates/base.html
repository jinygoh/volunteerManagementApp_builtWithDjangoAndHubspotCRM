<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}HopeHands{% endblock %}</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            background-color: #f8f9fa;
        }
        .navbar {
            background-color: #007bff;
            padding: 1rem;
        }
        .navbar a {
            color: white;
            text-decoration: none;
            margin-right: 1rem;
        }
        .container {
            padding: 2rem;
        }
        .btn {
            background-color: #007bff;
            color: white;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 0.25rem;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="{% url 'volunteer_list' %}">HopeHands</a>
        {% if user.is_authenticated %}
            <a href="{% url 'volunteer_list' %}">Volunteers</a>
            <a href="{% url 'pending_volunteers' %}">Pending Volunteers</a>
            <a href="{% url 'import_volunteers' %}">Import Volunteers</a>
            <a href="{% url 'skills_chart' %}">Skills Chart</a>
            <a href="{% url 'logout' %}">Logout</a>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
        {% endif %}
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
