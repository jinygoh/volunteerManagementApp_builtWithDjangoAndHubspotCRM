{% extends 'base.html' %}

{% block title %}Import Volunteers{% endblock %}

{% block content %}
    <h1>Import Volunteers from CSV</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <input type="file" name="csv_file" accept=".csv">
        <button type="submit" class="btn">Import</button>
    </form>
{% endblock %}
