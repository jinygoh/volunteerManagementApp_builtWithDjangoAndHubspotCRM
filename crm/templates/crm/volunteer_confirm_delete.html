{% extends 'base.html' %}

{% block title %}Confirm Delete{% endblock %}

{% block content %}
    <h1>Are you sure you want to delete {{ volunteer.first_name }} {{ volunteer.last_name }}?</h1>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn">Yes, delete</button>
        <a href="{% url 'volunteer_list' %}" class="btn">No, cancel</a>
    </form>
{% endblock %}
